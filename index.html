<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市民の声でつくる、芦屋の明日</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- メインCSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =============================== -->
<!-- ヘッダー画像 -->
<!-- =============================== -->
<div class="w-100 overflow-hidden shadow-sm mb-4" style="max-height: 380px; position: relative;">
    <img src="image/river.jpg"
         class="img-fluid w-100"
         style="height: 380px; object-fit: cover;"
         alt="メインヘッダー"
         onerror="this.style.display='none';">

    <div style="position:absolute; top:0; left:0; width:100%; height:100%;
                background:linear-gradient(to bottom,rgba(0,0,0,0.1),rgba(0,0,0,0.4));"></div>

    <div style="position:absolute; bottom:30px; left:5%; color:white; text-shadow:2px 2px 8px rgba(0,0,0,0.8);">
        <h1 class="fw-bold display-5">市民の声でつくる、芦屋の明日</h1>
        <p class="lead mb-0">みんなの想いをAIと紡ぎ、新しい芦屋のカタチをつくる</p>
    </div>
</div>

<div class="container my-4" style="max-width:1140px;">

<!-- =============================== -->
<!-- タブナビゲーション -->
<!-- =============================== -->
<ul class="nav nav-tabs mb-4 justify-content-center" id="myTab" role="tablist">
    <li class="nav-item">
        <button class="nav-link active" id="wall-tab-btn" data-bs-toggle="tab"
                data-bs-target="#wall-tab-pane" type="button" role="tab">
            ✨ 1. AIと壁打ちする
        </button>
    </li>
    <li class="nav-item">
        <button class="nav-link" id="map-tab-btn" data-bs-toggle="tab"
                data-bs-target="#map-tab-pane" type="button" role="tab">
            🗺️ 2. アイデアの地図
        </button>
    </li>
    <li class="nav-item">
        <button class="nav-link" id="list-tab-btn" data-bs-toggle="tab"
                data-bs-target="#list-tab-pane" type="button" role="tab">
            📥 3. 届いた提案箱
        </button>
    </li>
</ul>

<!-- =============================== -->
<!-- タブコンテンツ -->
<!-- =============================== -->
<div class="tab-content" id="myTabContent">

<!-- =============================== -->
<!-- タブ1：AIと壁打ち -->
<!-- =============================== -->
<div class="tab-pane fade show active" id="wall-tab-pane" role="tabpanel">

    <div class="mb-4">
        <img src="image/aiWall.jpg" class="tab-sub-image shadow-sm"
             alt="壁打ちイメージ"
             onerror="this.src='https://image.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1200&q=80'">
    </div>

    <div class="row g-4">

        <!-- 左：入力 -->
        <div class="col-lg-5">
            <div class="card shadow-sm p-4 h-100">
                <h5 class="fw-bold mb-3">🖋️ あなたの想いやアイデア</h5>
                <textarea id="content" class="form-control" rows="12"
                          placeholder="例：芦屋市では行政に私たちの意見が届いてない..."></textarea>

                <button id="btnAiAnalysis" class="btn btn-primary w-100 mt-3">
                    ✨ 1. AIと壁打ちする
                </button>
            </div>
        </div>

        <!-- 右：AI結果 -->
        <div class="col-lg-7">

            <!-- 初期表示 -->
            <div id="aiPlaceholder"
                 class="card shadow-sm p-4 h-100 text-center d-flex align-items-center justify-content-center">
                <div class="text-muted">
                    <div style="font-size:3rem;">💡</div>
                    <p class="fw-bold">AI思考整理エリア</p>
                    <p class="small">左側に意見を入力して送信すると、AIが論点を整理します。</p>
                </div>
            </div>

            <!-- AI結果 -->
            <div id="aiAssistBox" class="card shadow-sm p-4 h-100 d-none flex-column">

                <div id="aiSummaryText" class="p-3 mb-3 bg-light rounded"
                     style="border-left:4px solid #3b82f6;"></div>

                <div class="border rounded p-3 mb-3 flex-grow-1 bg-white"
                     style="max-height:350px; overflow-y:auto;">
                    <h6 class="fw-bold text-primary mb-3 border-bottom pb-2">
                        📋 5つの視点による論点整理
                    </h6>
                    <div id="aiPerspectivesText"></div>
                </div>

                <div class="p-3 bg-light rounded mb-3">
                    <span class="badge bg-dark">👑 推奨タイトル</span>
                    <div id="aiTitleText" class="fw-bold ps-1"></div>

                    <span class="badge bg-secondary mt-2">📝 200字要約</span>
                    <div id="aiRefinedText" class="text-secondary small ps-1"></div>
                </div>

                <button id="btnSubmitToBox" class="btn btn-success w-100">
                    📥 この内容で提案箱へ投稿する
                </button>
            </div>
        </div>
    </div>
</div>

<!-- =============================== -->
<!-- タブ2：アイデアの地図（静的） -->
<!-- =============================== -->
<div class="tab-pane fade" id="map-tab-pane" role="tabpanel">
    <div id="map-container" class="mt-4"></div> <!-- 名前変更 -->
</div>

<!-- =============================== -->
<!-- タブ3：届いた提案箱 -->
<!-- =============================== -->
<div class="tab-pane fade" id="list-tab-pane" role="tabpanel">

    <div class="mb-4">
        <img src="image/logic.jpg" class="tab-sub-image shadow-sm"
             alt="提案箱イメージ"
             onerror="this.src='https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?auto=format&fit=crop&w=1200&q=80'">
    </div>

    <h3 class="fw-bold mb-1">📥 提案箱（プロセスの可視化）</h3>
    <p class="text-muted small">投稿されたすべてのアイデアが分類ごとに表示されます。</p>

    <div id="proposal-container"></div>
</div>

</div><!-- tab-content -->
</div><!-- container -->

<!-- =============================== -->
<!-- JS -->
<!-- =============================== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
