<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市民の声でつくる、芦屋の明日</title>
    <style>
        :root {
            --ink: #1b1f1d;
            --board: #23282a;
            --paper: #eef0e4;
            --amber: #e8a33d;
            --teal: #2f7a6b;
            --violet: #6d5aa8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Zen Kaku Gothic New', system-ui, sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.7;
        }
        .topbar {
            background: var(--board);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand {
            font-size: 1.3em;
            font-weight: 800;
        }
        nav button {
            background: transparent;
            border: 2px solid #fff;
            color: white;
            padding: 8px 16px;
            margin-left: 8px;
            border-radius: 6px;
            cursor: pointer;
        }
        nav button.active {
            background: var(--amber);
            color: var(--ink);
            border-color: var(--amber);
        }
        .page {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .page.active { display: block; }
        h1 { font-size: 2.2em; margin-bottom: 10px; }
        h2 { color: var(--teal); margin: 30px 0 15px; }
        
        /* Home - 5 categories 2-column */
        .map-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .cat-card {
            border: 2px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }
        .cat-header {
            background: var(--teal);
            color: white;
            padding: 15px;
            font-weight: bold;
        }
        .map-left, .update-right {
            padding: 20px;
        }
        .map-left {
            background: #f9f9f9;
            min-height: 280px;
        }
        .update-btn {
            background: var(--violet);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .update-body {
            display: none;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }
        
        /* Post form */
        textarea {
            width: 100%;
            min-height: 180px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        button.primary {
            background: var(--teal);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* Board */
        .board-container {
            margin-top: 30px;
        }
        .main-cat {
            background: white;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
        }
        .main-header {
            padding: 15px;
            background: #f8f8f8;
            cursor: pointer;
            font-weight: bold;
        }
        /* Add more styles as needed */
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">🗣️ 市民の声でつくる、芦屋の明日</div>
        <nav>
            <button class="active" onclick="showPage('home')">ホーム</button>
            <button onclick="showPage('assist')">声を届ける</button>
            <button onclick="showPage('board')">声のボード</button>
        </nav>
    </header>

    <!-- HOME -->
    <section id="home" class="page active">
        <h1>みんなの想いをAIと紡ぎ、新しい芦屋のカタチをつくる</h1>
        <p style="font-size:1.1em; max-width:800px;">芦屋の未来を市民の声で共にデザインするプラットフォームです。</p>
        
        <div class="section-lead" style="margin:30px 0;">
            <h2>🗺️ 5つの大分類｜未来提案の原点 × 共創アップデート</h2>
        </div>
        
        <div id="categories" class="map-row">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- 声を届ける -->
    <section id="assist" class="page">
        <h2>🤖 声を届ける</h2>
        <p>芦屋について思っていることを自由に書いてください。AIが分析・整理します。</p>
        <textarea id="voiceInput" placeholder="例: 芦屋川沿いの公園をもっと子育て世代が利用しやすくしてほしい..."></textarea>
        <button class="primary" onclick="submitVoice()">AIで分析する</button>
        
        <div id="analysisResult" style="margin-top:30px; display:none;">
            <!-- Results populated here -->
        </div>
    </section>

    <!-- 声のボード -->
    <section id="board" class="page">
        <h2>📌 声のボード（提案集約）</h2>
        <div id="proposalBoard" class="board-container">
            <!-- Dynamic tree populated by JS -->
        </div>
    </section>

    <script>
        // 5 Categories with base summaries
        const categories = [
            {
                name: "まちづくり・都市計画（住みやすさの基盤）",
                base: "芦屋市は六甲山と海に囲まれた恵まれた地形を活かし、住宅地としての品格と防災機能を両立するまちづくりが求められます。老朽化したインフラの計画的更新、駅周辺の回遊性向上、バリアフリー化を進めます。子育て世代と高齢者が安心して暮らせるよう、公園・緑地の再整備と防災拠点機能の強化を図ります。民間活力の導入により、芦屋川沿いの景観を活かした魅力ある都市空間を創出し、持続可能な住環境を実現します。"
            },
            {
                name: "子育て・教育環境（次世代を育てるまち）",
                base: "子どもたちが自ら学び、挑戦できる環境整備が急務です。画一的な教育から脱却し、個性と探究心を伸ばすプロジェクト型学習を導入します。保育士・教員のファシリテーター研修を強化し、ICT活用と体験学習を組み合わせます。放課後の居場所づくりと地域人材の参画により、学校・家庭・地域が連携した教育エコシステムを構築し、芦屋から世界で活躍する人材を育成します。"
            },
            {
                name: "福祉・健康・共生（誰も取り残さないまち）",
                base: "高齢化が進む芦屋市では、医療・介護・予防が一体となった地域包括ケアの深化が必要です。在宅医療の充実、認知症支援、介護予防事業を強化します。障害の有無や国籍に関わらず誰もが活躍できるよう、ユニバーサルデザインのまちづくりと就労支援を推進します。地域のつながりを再構築し、孤立を防ぐ見守りネットワークと多世代交流拠点を整備し、共生社会を実現します。"
            },
            {
                name: "環境・持続可能性（未来に繋ぐ芦屋）",
                base: "2050年カーボンニュートラル実現に向け、芦屋市は率先して脱炭素化を進めます。公共施設のZEB化、太陽光発電の導入拡大、EV充電インフラ整備を加速します。ごみの削減と資源循環を徹底し、プラスチック・食品ロス対策を強化します。六甲山系の豊かな自然環境を保全し、生物多様性を守ります。市民・事業者・行政が一体となり、環境先進都市として次世代に美しい芦屋を引き継ぎます。"
            },
            {
                name: "行政・市民参加・活力（未来を拓く力）",
                base: "市民と行政の協働により、芦屋の新たな価値を創造します。デジタル技術を活用した行政手続きのオンライン化と、データに基づく政策立案を推進します。市民参加型の予算編成やワークショップを拡充し、多様な声を市政に反映します。文化・芸術・スポーツ振興により都市の魅力を高め、スタートアップ支援と観光施策で地域経済を活性化します。透明で効率的な行財政運営により、持続可能な市政を実現します。"
            }
        ];

        // Populate home categories
        function populateHome() {
            const container = document.getElementById('categories');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'cat-card';
                div.innerHTML = `
                    <div class="cat-header">${cat.name}</div>
                    <div class="map-row">
                        <div class="map-left">
                            <strong>未来提案の原点（アイデアの地図）</strong>
                            <p style="margin-top:10px; font-size:0.95em;">${cat.base}</p>
                        </div>
                        <div class="update-right">
                            <strong>提案集約・共創アップデート案</strong>
                            <button class="update-btn" onclick="toggleUpdate(this, '${cat.name}')">アップデートを表示</button>
                            <div class="update-body" id="update-${cat.name.replace(/[^a-zA-Z0-9]/g,'')}">
                                ここに市民の新統合提案（50%）と初期提案（50%）がリアルタイム表示されます。
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function toggleUpdate(btn, catName) {
            const bodyId = `update-${catName.replace(/[^a-zA-Z0-9]/g,'')}`;
            const body = document.getElementById(bodyId);
            if (body) {
                body.style.display = body.style.display === 'block' ? 'none' : 'block';
                btn.textContent = body.style.display === 'block' ? '閉じる' : 'アップデートを表示';
            }
        }

        // Simple voice submission simulation
        let posts = []; // In-memory storage for demo

        function submitVoice() {
            const input = document.getElementById('voiceInput').value.trim();
            if (!input) return alert('内容を入力してください');
            
            const resultDiv = document.getElementById('analysisResult');
            
            // Simulated AI analysis
            const analysis = `
<strong>推奨タイトル:</strong> 芦屋の持続可能なまちづくり<br>
<strong>大分類:</strong> まちづくり・都市計画<br>
<strong>要約 (198文字):</strong> 芦屋の自然と都市機能を活かした持続可能な開発を推進すべきです。インフラ更新と緑地整備を並行し、子育て・高齢者両対応の空間設計を。AI分析により、市民の声が防災と魅力向上に集約されています。<br><br>
<strong>5視点分析:</strong><br>
・核心: 住みやすさの基盤強化<br>
・変化: 高齢化と気候変動対応<br>
・成功事例: 公園再整備プロジェクト<br>
・懸念点: 予算と民間連携<br>
・問い: 次世代に何を残すか？
            `;
            
            resultDiv.innerHTML = `
                <div style="background:white; padding:25px; border-radius:12px; border:2px solid var(--teal);">
                    <h3>AI分析結果</h3>
                    ${analysis}
                    <button class="primary" style="margin-top:20px;" onclick="postToBoard('${input}')">この声をボードに投稿</button>
                </div>
            `;
            resultDiv.style.display = 'block';
        }

        function postToBoard(originalText) {
            // Simulate posting and integration
            alert('投稿されました！ 声のボードで確認してください（デモ）。新提案は自動統合ロジックで処理されます。');
            // In real app, would call backend or localStorage
            posts.push({text: originalText, category: 'まちづくり・都市計画'});
            showPage('board');
        }

        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            if (btn) {
                document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        // Initialize
        window.onload = function() {
            populateHome();
            // Demo board content can be expanded
            console.log('芦屋プラットフォーム（カスタム版）初期化完了');
        };
    </script>
</body>
</html>
