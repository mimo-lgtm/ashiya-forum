<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>芦屋市 共創プラットホーム - AI協働型政策立案システム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      line-height: 1.6;
    }
   .container { 
      max-width: 1280px; 
      margin: 0 auto; 
      background: white; 
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    header { 
      padding: 32px 24px; 
      border-bottom: 2px solid #e5e7eb; 
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
      color: white;
    }
    header h1 { 
      font-size: 32px; 
      font-weight: 700;
      margin-bottom: 6px;
    }
    header p { 
      font-size: 14px; 
      opacity: 0.9;
    }
    nav {
      display: flex;
      gap: 0;
      padding: 0 24px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
    }
   .tab-btn {
      padding: 14px 24px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #6b7280;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
   .tab-btn:hover { 
      color: #1f2937;
      background: #f3f4f6;
    }
   .tab-btn.active { 
      color: #2563eb;
      border-bottom-color: #2563eb;
      background: white;
    }
   .tab-content { 
      padding: 32px 24px; 
      display: none; 
    }
   .tab-content.active { display: block; }
    h2 { 
      font-size: 24px; 
      margin-bottom: 24px; 
      color: #111827;
      font-weight: 700;
    }
    h3 { 
      font-size: 18px; 
      margin-bottom: 12px; 
      color: #1f2937;
      font-weight: 600;
    }
    h4 { 
      font-size: 16px; 
      margin-bottom: 8px; 
      color: #1f2937;
      font-weight: 600;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #374151;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 14px;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.7;
      resize: vertical;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #2563eb;
    }
    input[type="text"], select {
      padding: 10px 14px;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #2563eb;
    }
    button {
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover { 
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    button:disabled { 
      background: #9ca3af; 
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
   .card {
      padding: 20px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: #f9fafb;
      margin-bottom: 20px;
    }
   .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
   .badge-blue { background: #dbeafe; color: #1e40af; }
   .badge-green { background: #d1fae5; color: #065f46; }
   .badge-purple { background: #e9d5ff; color: #6b21a8; }
   .badge-orange { background: #fed7aa; color: #9a3412; }
    #aiResult, #opinionsList {
      margin-top: 24px;
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
      min-height: 120px;
      border: 2px solid #e5e7eb;
    }
   .opinion-item {
      padding: 20px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 16px;
      background: white;
      transition: box-shadow 0.2s;
    }
   .opinion-item:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
   .opinion-meta {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
   .opinion-content {
      font-size: 15px;
      line-height: 1.8;
      color: #374151;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }
   .like-btn {
      padding: 8px 16px;
      font-size: 14px;
      background: #f3f4f6;
      color: #374151;
      border: 2px solid #d1d5db;
      border-radius: 8px;
    }
   .like-btn:hover { 
      background: #e5e7eb;
      transform: none;
      box-shadow: none;
    }
   .like-btn.liked { 
      background: #fef3c7; 
      color: #92400e; 
      border-color: #fcd34d; 
    }
   .form-group {
      margin-bottom: 20px;
    }
   .flex-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
   .filter-group {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
   .status-message {
      padding: 12px 16px;
      border-radius: 8px;
      margin: 16px 0;
      font-size: 14px;
    }
   .status-success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }
   .status-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
   .status-info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }
   .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>芦屋市 共創プラットホーム</h1>
      <p>市民の声を市政に反映する、AI協働型の政策共創システム</p>
    </header>

    <nav>
      <button id="create-tab-btn" class="tab-btn active">提案作成</button>
      <button id="list-tab-btn" class="tab-btn">提案一覧</button>
      <button id="map-tab-btn" class="tab-btn">アイデアの地図</button>
    </nav>

    <!-- 提案作成タブ -->
    <div id="create-tab" class="tab-content active">
      <h2>新しい提案を作成</h2>
      <div style="max-width: 900px;">
        <div class="form-group">
          <label for="content">提案内容 *</label>
          <textarea id="content" placeholder="芦屋市への提案やアイデアを自由に記入してください。&#10;&#10;例：駅前の歩道が狭くて危険です。ベビーカーや車椅子が通れるように拡幅し、緑陰のある休憩スペースを設置してはどうでしょうか。"></textarea>
        </div>
        <div class="flex-row">
          <div style="flex: 1;">
            <label for="bigCatName">大分類 *</label>
            <input type="text" id="bigCatName" placeholder="例：まちづくり・都市計画" style="width: 100%;">
          </div>
          <div style="padding-top: 28px;">
            <button onclick="aiAnalysis()" id="aiAnalysisBtn">AI壁打ち実行</button>
          </div>
        </div>
        <div id="aiResult">
          <span style="color: #9ca3af;">「AI壁打ち実行」を押すと、AIが分類提案と改善アドバイスを表示します</span>
        </div>
        <button onclick="submitOpinion()" id="submitBtn" style="margin-top: 20px; width: 100%; padding: 14px; font-size: 16px;">提案を登録する</button>
        <div id="submitStatus"></div>
      </div>
    </div>

    <!-- 提案一覧タブ -->
    <div id="list-tab" class="tab-content">
      <h2>みんなの提案一覧</h2>
      <div class="filter-group">
        <select id="filterBigCat" style="min-width: 200px;">
          <option value="">すべての大分類</option>
        </select>
        <select id="filterSmallCat" style="min-width: 200px;">
          <option value="">すべての中分類</option>
        </select>
        <select id="sortBy" style="min-width: 150px;">
          <option value="created_at_desc">新着順</option>
          <option value="like_count_desc">いいね順</option>
        </select>
        <button onclick="fetchOpinions()">絞り込み</button>
      </div>
      <div id="opinionsList">
        <span style="color: #9ca3af;">読み込み中...</span>
      </div>
    </div>

    <!-- アイデアの地図タブ -->
    <div id="map-tab" class="tab-content">
      <div style="max-width: 1000px; margin: 0 auto;">
        <h2 style="margin-bottom: 28px;">アイデアの地図：5分類の現状認識</h2>
        
        <div id="baseSummaryContainer"></div>

        <div id="finalProposalSection" style="margin-top: 48px; padding: 32px; border: 3px solid #2563eb; border-radius: 16px; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);">
          <h3 style="margin: 0 0 12px 0; color: #1e40af; font-size: 22px;">最終提案：市民との共創版</h3>
          <p style="font-size: 14px; color: #1e40af; margin: 0 0 20px 0; line-height: 1.7;">
            「提案作成」タブで入力した元の提案と、同大分類の市民の声をAIが統合し、<br>300字の政策提言として生成します
          </p>
          <div id="finalProposalText" style="min-height: 160px; padding: 24px; background: white; border-radius: 12px; margin: 20px 0; font-size: 16px; line-height: 1.9; border: 2px solid #bfdbfe; color: #1f2937; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.1);">
            <span style="color: #9ca3af;">「最終提案を生成」ボタンを押すと表示されます</span>
          </div>
          <button id="generateFinalBtn" onclick="generateFinalProposal()" style="background: #2563eb; color: white; padding: 16px 32px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);">
            最終提案を生成
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
