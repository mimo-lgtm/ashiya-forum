<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芦屋の明日を共に考える</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: system-ui, sans-serif; }
        .header { height: 380px; background: linear-gradient(rgba(0,0,0,0.5), rgba(30,58,138,0.8)), url('https://picsum.photos/id/1015/1200/380') center/cover; }
        .nav-link.active { color: #1e40af !important; border-bottom: 3px solid #1e40af; }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <div class="header w-100 position-relative">
        <div class="position-absolute bottom-0 start-0 p-5 text-white">
            <h1 class="fw-bold display-4">芦屋の明日を共に考える</h1>
            <p class="lead">市民の声でつくる、芦屋の未来</p>
        </div>
    </div>

    <div class="container my-4">
        <!-- タブ -->
        <ul class="nav nav-tabs mb-4 justify-content-center" id="myTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#wall-tab">✨ 1. AIと壁打ち</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#map-tab">🗺️ 2. アイデアの地図</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#list-tab">📥 3. 提案箱</button></li>
        </ul>

        <!-- タブ内容 -->
        <div class="tab-content">
            <div class="tab-pane fade show active" id="wall-tab">
                <!-- AI壁打ちUI -->
                <div class="row g-4">
                    <div class="col-lg-5">
                        <textarea id="content" class="form-control" rows="12" placeholder="芦屋市に関するご意見・提案を自由に書いてください..."></textarea>
                        <button id="btnAiAnalysis" class="btn btn-primary w-100 mt-3">✨ AIと壁打ちする</button>
                    </div>
                    <div class="col-lg-7">
                        <div id="aiAssistBox" class="d-none">
                            <div id="aiSummaryText" class="p-3 bg-light rounded"></div>
                            <div id="aiTitleText" class="fw-bold mt-3"></div>
                            <button id="btnSubmitToBox" class="btn btn-success w-100 mt-3">📥 提案箱へ投稿する</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="list-tab">
                <div id="proposal-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
