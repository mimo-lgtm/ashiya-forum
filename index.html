<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芦屋の明日を共に考える</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: system-ui, sans-serif; }
        .header-img {
            height: 380px;
            object-fit: cover;
            filter: brightness(0.85);
        }
        .nav-link.active { color: #1e40af !important; border-bottom: 3px solid #1e40af; }
        .card { transition: all 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <div class="w-100 overflow-hidden shadow-sm mb-4 position-relative" style="height: 380px; background-color: #1e3a8a;">
        <img src="https://picsum.photos/id/1015/1200/380" class="header-img w-100" alt="芦屋">
        <div class="position-absolute top-0 start-0 w-100 h-100" style="background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(30,58,138,0.8));"></div>
        <div class="position-absolute bottom-0 start-0 p-5 text-white">
            <h1 class="fw-bold display-5">芦屋の明日を共に考える</h1>
            <p class="lead mb-0">市民の声でつくる、芦屋の未来</p>
        </div>
    </div>

    <div class="container my-4">
        <ul class="nav nav-tabs mb-4 justify-content-center" id="myTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#wall-tab">✨ AIと壁打ち</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#map-tab">🗺️ アイデアの地図</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#list-tab">📥 提案箱</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="wall-tab">
                <!-- 壁打ちUIをここに -->
                <p>壁打ちUI（後で追加）</p>
            </div>
            <div class="tab-pane fade" id="map-tab">
                <p>アイデアの地図（後で追加）</p>
            </div>
            <div class="tab-pane fade" id="list-tab">
                <div id="proposal-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
